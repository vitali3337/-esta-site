<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>ESTA — Добавить объект</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
}

.container{
max-width:700px;
margin:auto;
padding:30px;
}

.card{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

input,textarea{
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:6px;
border:1px solid #ddd;
font-size:16px;
}

button{
background:black;
color:white;
padding:14px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
width:100%;
}

button:hover{
opacity:0.9;
}

</style>

</head>

<body>

<div class="container">

<h1>ESTA — Кабинет агента</h1>

<div class="card">

<h2>Добавить объявление</h2>

<form id="addListing">

<input type="text" id="title" placeholder="Название объекта" required>

<input type="number" id="price" placeholder="Цена $" required>

<input type="text" id="city" placeholder="Город" value="Тирасполь">

<input type="number" id="rooms" placeholder="Количество комнат">

<input type="text" id="floor" placeholder="Этаж">

<input type="text" id="phone" placeholder="Телефон">

<textarea id="description" placeholder="Описание"></textarea>

<label>Фотографии объекта (до 10)</label>
<input type="file" id="images" multiple accept="image/*">

<button type="submit">
Добавить объект
</button>

</form>

</div>

</div>

<script>

const API="https://realinvest-api-production.up.railway.app/listings"

const CLOUD_NAME="dqexunri"
const PRESET="esta_upload"

document.getElementById("addListing").addEventListener("submit",async function(e){

e.preventDefault()

let title=document.getElementById("title").value
let price=document.getElementById("price").value
let city=document.getElementById("city").value
let rooms=document.getElementById("rooms").value
let floor=document.getElementById("floor").value
let phone=document.getElementById("phone").value
let description=document.getElementById("description").value

let files=document.getElementById("images").files

let images=[]

for(let file of files){

let formData=new FormData()

formData.append("file",file)
formData.append("upload_preset",PRESET)

let res=await fetch(
`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,
{
method:"POST",
body:formData
})

let data=await res.json()

images.push(data.secure_url)

}

let listing={
title,
price,
city,
rooms,
floor,
phone,
description,
image:images[0],
gallery:images
}

await fetch(API,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(listing)
})

alert("Объявление добавлено!")

location.reload()

})

</script>

</body>
</html>
