<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Добавить объект</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:40px;
}

.container{
max-width:600px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
}

input, textarea{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:20px;
border:1px solid #ddd;
border-radius:6px;
}

button{
background:black;
color:white;
padding:12px;
border:none;
border-radius:6px;
cursor:pointer;
}

.preview{
display:flex;
flex-wrap:wrap;
gap:10px;
}

.preview img{
width:100px;
height:100px;
object-fit:cover;
border-radius:6px;
}

</style>

</head>

<body>

<div class="container">

<h2>Добавить объект</h2>

<form id="form">

<label>Название</label>
<input id="title" required>

<label>Цена</label>
<input id="price" required>

<label>Город</label>
<input id="city" value="Тирасполь">

<label>Описание</label>
<textarea id="description"></textarea>

<label>Фотографии (до 10)</label>
<input type="file" id="images" multiple accept="image/*">

<div class="preview" id="preview"></div>

<button type="submit">Добавить объект</button>

</form>

</div>

<script>

const preview=document.getElementById("preview");

document.getElementById("images").addEventListener("change",function(){

preview.innerHTML="";

let files=this.files;

for(let file of files){

let reader=new FileReader();

reader.onload=function(e){

let img=document.createElement("img");
img.src=e.target.result;

preview.appendChild(img);

};

reader.readAsDataURL(file);

}

});

async function uploadImages(files){

let urls=[];

for(let file of files){

let formData=new FormData();

formData.append("file",file);
formData.append("upload_preset","esta_upload");

let res=await fetch(
"https://api.cloudinary.com/v1_1/dquexunri/image/upload",
{
method:"POST",
body:formData
}
);

let data=await res.json();

urls.push(data.secure_url);

}

return urls;

}

document.getElementById("form").addEventListener("submit",async function(e){

e.preventDefault();

let files=document.getElementById("images").files;

let imageUrls=await uploadImages(files);

let listing={

title:document.getElementById("title").value,
price:document.getElementById("price").value,
city:document.getElementById("city").value,
description:document.getElementById("description").value,
images:imageUrls

};

await fetch(
"https://realinvest-api-production.up.railway.app/listings",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(listing)
}
);

alert("Объявление добавлено");

location.href="/";

});

</script>

</body>
</html>
