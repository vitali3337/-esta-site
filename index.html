<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<title>ESTA — Недвижимость</title>

<style>

body{
font-family: Arial;
background:#f5f5f5;
margin:0;
padding:0;
}

header{
background:#111;
color:white;
padding:20px;
font-size:24px;
text-align:center;
}

.search{
text-align:center;
padding:20px;
}

.search input{
padding:10px;
width:300px;
font-size:16px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
padding:20px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-body{
padding:15px;
}

.price{
font-size:20px;
color:#2a7;
font-weight:bold;
}

button{
padding:10px 20px;
margin:10px;
}

#addForm{
background:white;
padding:20px;
margin:20px;
display:none;
}

</style>

</head>

<body>

<header>
ESTA — Портал недвижимости
</header>

<div class="search">

<input id="search" placeholder="Поиск: например 2 комнаты до 50000">

<button onclick="openForm()">Добавить объект</button>

</div>

<div id="addForm">

<h3>Добавить недвижимость</h3>

<input id="title" placeholder="Название"><br><br>
<input id="city" placeholder="Город"><br><br>
<input id="roomsInput" placeholder="Комнаты"><br><br>
<input id="priceInput" placeholder="Цена"><br><br>
<input id="imageInput" placeholder="Ссылка на фото"><br><br>

<button onclick="addProperty()">Сохранить</button>

</div>

<div class="container" id="homes"></div>

<script>

let homes = []

async function loadHomes(){

const res = await fetch("http://localhost:3000/homes")

homes = await res.json()

renderHomes(homes)

}

function renderHomes(list){

const container=document.getElementById("homes")

container.innerHTML=""

list.forEach(home=>{

container.innerHTML+=`

<div class="card">

<img src="${home.image}">

<div class="card-body">

<h3>${home.title}</h3>

<p>${home.city}</p>

<p>${home.rooms} комнаты</p>

<div class="price">$${home.price}</div>

</div>

</div>

`

})

}

document.getElementById("search").addEventListener("input",function(){

const text=this.value.toLowerCase()

const filtered=homes.filter(home=>

home.title.toLowerCase().includes(text) ||

home.city.toLowerCase().includes(text) ||

home.price.toString().includes(text)

)

renderHomes(filtered)

})

function openForm(){

const form=document.getElementById("addForm")

form.style.display=form.style.display==="none"?"block":"none"

}

async function addProperty(){

const property={

title:document.getElementById("title").value,
city:document.getElementById("city").value,
rooms:Number(document.getElementById("roomsInput").value),
price:Number(document.getElementById("priceInput").value),
image:document.getElementById("imageInput").value

}

await fetch("http://localhost:3000/homes",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(property)

})

loadHomes()

alert("Объект добавлен")

}

loadHomes()

</script>

</body>
</html>
