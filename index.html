<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESTA — Недвижимость Молдовы и ПМР</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0f0e0d;
    --cream: #f5f0e8;
    --gold: #c9a84c;
    --gold-light: #e8d4a0;
    --rust: #b85c3a;
    --sage: #4a6741;
    --slate: #3a4a5c;
    --mist: #e8edf2;
    --white: #ffffff;
    --card-bg: #faf8f4;
    --border: #e0d8cc;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Manrope', sans-serif;
    background: var(--cream);
    color: var(--ink);
    overflow-x: hidden;
  }

  /* ─── NAVBAR ─── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 40px;
    height: 64px;
    background: rgba(245,240,232,0.92);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }
  .nav-logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem; font-weight: 900;
    color: var(--ink); text-decoration: none;
    letter-spacing: -1px;
  }
  .nav-logo span { color: var(--gold); }
  .nav-links { display: flex; gap: 32px; align-items: center; }
  .nav-links a {
    text-decoration: none; color: var(--ink);
    font-size: 0.85rem; font-weight: 500;
    letter-spacing: 0.05em; text-transform: uppercase;
    opacity: 0.7; transition: opacity 0.2s;
  }
  .nav-links a:hover { opacity: 1; }
  .nav-right { display: flex; gap: 12px; align-items: center; }
  .btn-nav {
    padding: 8px 20px; border-radius: 40px;
    font-size: 0.82rem; font-weight: 600; cursor: pointer;
    transition: all 0.2s; border: none;
    font-family: 'Manrope', sans-serif;
  }
  .btn-outline { background: transparent; border: 1.5px solid var(--ink); color: var(--ink); }
  .btn-outline:hover { background: var(--ink); color: var(--cream); }
  .btn-gold { background: var(--gold); color: var(--white); }
  .btn-gold:hover { background: #b8943c; transform: translateY(-1px); }
  .btn-ai {
    background: var(--ink); color: var(--gold);
    display: flex; align-items: center; gap: 6px;
  }
  .btn-ai:hover { background: #2a2a2a; }

  /* ─── HERO ─── */
  .hero {
    min-height: 100vh;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    padding: 80px 40px 60px;
    position: relative;
    overflow: hidden;
  }
  .hero-bg {
    position: absolute; inset: 0;
    background: 
      radial-gradient(ellipse 80% 60% at 20% 40%, rgba(201,168,76,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 80% 60%, rgba(74,103,65,0.08) 0%, transparent 60%),
      var(--cream);
  }
  .hero-noise {
    position: absolute; inset: 0; opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  }
  .hero-content { position: relative; text-align: center; max-width: 900px; }
  .hero-badge {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--ink); color: var(--gold);
    padding: 6px 16px; border-radius: 40px;
    font-size: 0.75rem; font-weight: 600; letter-spacing: 0.1em;
    text-transform: uppercase; margin-bottom: 28px;
    animation: fadeDown 0.6s ease both;
  }
  .hero-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.8rem, 7vw, 5.5rem);
    font-weight: 900; line-height: 1.05;
    letter-spacing: -2px;
    margin-bottom: 20px;
    animation: fadeDown 0.6s 0.1s ease both;
  }
  .hero-title em { color: var(--gold); font-style: italic; }
  .hero-subtitle {
    font-size: 1.05rem; color: #5a5248;
    line-height: 1.7; margin-bottom: 48px;
    animation: fadeDown 0.6s 0.2s ease both;
  }
  .hero-stats {
    display: flex; gap: 48px; justify-content: center;
    margin-bottom: 52px;
    animation: fadeDown 0.6s 0.3s ease both;
  }
  .hero-stat { text-align: center; }
  .hero-stat .num {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem; font-weight: 900; color: var(--ink);
    display: block;
  }
  .hero-stat .lbl { font-size: 0.8rem; color: #8a7e6a; text-transform: uppercase; letter-spacing: 0.1em; }

  /* ─── SEARCH BOX ─── */
  .search-box {
    background: var(--white);
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(15,14,13,0.12), 0 4px 16px rgba(15,14,13,0.06);
    padding: 28px 32px;
    width: 100%; max-width: 860px;
    animation: fadeUp 0.6s 0.4s ease both;
  }
  .search-tabs {
    display: flex; gap: 4px; margin-bottom: 20px;
    background: var(--mist); border-radius: 10px; padding: 4px;
  }
  .search-tab {
    flex: 1; padding: 8px 16px; border-radius: 8px; border: none;
    font-family: 'Manrope', sans-serif; font-size: 0.85rem; font-weight: 600;
    cursor: pointer; transition: all 0.2s; background: transparent; color: #6a6a6a;
  }
  .search-tab.active { background: var(--white); color: var(--ink); box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .search-row { display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr auto; gap: 12px; align-items: end; }
  .search-field label { display: block; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #8a7e6a; margin-bottom: 6px; }
  .search-field select, .search-field input {
    width: 100%; padding: 10px 14px; border-radius: 10px;
    border: 1.5px solid var(--border); background: var(--cream);
    font-family: 'Manrope', sans-serif; font-size: 0.9rem; color: var(--ink);
    outline: none; transition: border-color 0.2s;
  }
  .search-field select:focus, .search-field input:focus { border-color: var(--gold); }
  .btn-search {
    padding: 10px 28px; background: var(--ink); color: var(--cream);
    border: none; border-radius: 10px; cursor: pointer;
    font-family: 'Manrope', sans-serif; font-size: 0.9rem; font-weight: 700;
    transition: all 0.2s; white-space: nowrap;
  }
  .btn-search:hover { background: #2a2a2a; transform: translateY(-1px); }
  .ai-hint {
    margin-top: 14px; display: flex; align-items: center; gap: 10px;
    padding: 10px 16px; background: linear-gradient(135deg, #0f0e0d, #2a2a2a);
    border-radius: 10px; cursor: pointer; transition: opacity 0.2s;
  }
  .ai-hint:hover { opacity: 0.9; }
  .ai-hint span { color: var(--gold); font-size: 0.82rem; }
  .ai-hint .ai-text { color: rgba(255,255,255,0.7); font-size: 0.82rem; }
  .ai-hint .ai-cta { color: var(--gold); font-weight: 700; font-size: 0.82rem; margin-left: auto; }

  /* ─── LISTINGS ─── */
  .section { padding: 80px 40px; max-width: 1300px; margin: 0 auto; }
  .section-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 36px; }
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem; font-weight: 700; letter-spacing: -1px;
  }
  .section-title span { color: var(--gold); }
  .section-link { color: var(--gold); font-size: 0.85rem; font-weight: 600; text-decoration: none; }
  .section-link:hover { text-decoration: underline; }

  .filters-bar {
    display: flex; gap: 10px; flex-wrap: wrap;
    margin-bottom: 28px; padding: 16px 20px;
    background: var(--white); border-radius: 14px;
    border: 1px solid var(--border);
  }
  .filter-chip {
    padding: 6px 14px; border-radius: 40px;
    border: 1.5px solid var(--border); background: transparent;
    font-family: 'Manrope', sans-serif; font-size: 0.8rem; font-weight: 600;
    cursor: pointer; transition: all 0.2s; color: var(--ink);
  }
  .filter-chip.active { background: var(--ink); color: var(--cream); border-color: var(--ink); }
  .filter-chip:hover:not(.active) { border-color: var(--gold); color: var(--gold); }

  .listings-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; }
  .listing-card {
    background: var(--white); border-radius: 16px;
    overflow: hidden; border: 1px solid var(--border);
    transition: all 0.3s; cursor: pointer; position: relative;
  }
  .listing-card:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(15,14,13,0.12); border-color: var(--gold); }
  .listing-photo {
    height: 200px; overflow: hidden; position: relative;
    background: linear-gradient(135deg, #e8e0d0, #d0c8b8);
  }
  .listing-photo img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s; }
  .listing-card:hover .listing-photo img { transform: scale(1.05); }
  .listing-photo-placeholder {
    width: 100%; height: 100%; display: flex; align-items: center;
    justify-content: center; font-size: 3rem; opacity: 0.4;
  }
  .badge-vip {
    position: absolute; top: 12px; left: 12px;
    background: var(--gold); color: var(--white);
    padding: 3px 10px; border-radius: 20px;
    font-size: 0.7rem; font-weight: 700; letter-spacing: 0.05em;
  }
  .badge-new {
    position: absolute; top: 12px; right: 12px;
    background: var(--sage); color: var(--white);
    padding: 3px 10px; border-radius: 20px;
    font-size: 0.7rem; font-weight: 700;
  }
  .listing-body { padding: 18px 20px; }
  .listing-price {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem; font-weight: 700; color: var(--ink);
    margin-bottom: 6px;
  }
  .listing-price span { font-size: 1rem; color: #8a7e6a; font-family: 'Manrope', sans-serif; font-weight: 400; }
  .listing-title { font-size: 0.9rem; font-weight: 600; margin-bottom: 10px; color: var(--ink); }
  .listing-meta { display: flex; gap: 14px; font-size: 0.78rem; color: #8a7e6a; flex-wrap: wrap; }
  .listing-meta span { display: flex; align-items: center; gap: 4px; }
  .listing-footer { padding: 12px 20px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .agent-mini { display: flex; align-items: center; gap: 8px; }
  .agent-ava {
    width: 28px; height: 28px; border-radius: 50%;
    background: var(--gold-light); display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem; font-weight: 700;
  }
  .agent-name { font-size: 0.75rem; color: #6a6a6a; }
  .btn-call {
    padding: 6px 14px; border-radius: 20px;
    background: var(--sage); color: var(--white);
    border: none; font-size: 0.75rem; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
    font-family: 'Manrope', sans-serif;
  }
  .btn-call:hover { background: #3a5631; }

  /* ─── AI MODAL ─── */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 2000;
    background: rgba(15,14,13,0.7); backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: opacity 0.3s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .ai-modal {
    background: var(--white); border-radius: 24px;
    width: 90%; max-width: 640px; max-height: 80vh;
    display: flex; flex-direction: column;
    box-shadow: 0 40px 80px rgba(0,0,0,0.3);
    transform: translateY(20px); transition: transform 0.3s;
    overflow: hidden;
  }
  .modal-overlay.open .ai-modal { transform: translateY(0); }
  .ai-modal-header {
    padding: 24px 28px 20px;
    background: linear-gradient(135deg, #0f0e0d, #1a1a1a);
    color: var(--white);
  }
  .ai-modal-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.4rem; margin-bottom: 4px;
  }
  .ai-modal-header h2 span { color: var(--gold); }
  .ai-modal-header p { font-size: 0.82rem; opacity: 0.6; }
  .ai-modal-body { padding: 24px 28px; flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
  .ai-message {
    display: flex; gap: 12px; align-items: flex-start;
    animation: fadeUp 0.3s ease both;
  }
  .ai-message.user { flex-direction: row-reverse; }
  .ai-avatar {
    width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 1rem;
  }
  .ai-avatar.bot { background: var(--ink); color: var(--gold); font-size: 0.8rem; font-weight: 700; }
  .ai-avatar.user { background: var(--gold); }
  .ai-bubble {
    padding: 12px 16px; border-radius: 16px; max-width: 80%;
    font-size: 0.88rem; line-height: 1.6;
  }
  .ai-bubble.bot { background: var(--mist); color: var(--ink); border-radius: 4px 16px 16px 16px; }
  .ai-bubble.user { background: var(--ink); color: var(--cream); border-radius: 16px 4px 16px 16px; }
  .ai-typing { display: flex; gap: 4px; padding: 12px 16px; }
  .ai-typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); animation: typing 1s infinite; }
  .ai-typing span:nth-child(2) { animation-delay: 0.15s; }
  .ai-typing span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes typing { 0%, 60%, 100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-6px); opacity: 1; } }
  .ai-quick-btns { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
  .ai-quick-btn {
    padding: 6px 14px; border-radius: 20px;
    border: 1.5px solid var(--border); background: var(--cream);
    font-size: 0.78rem; font-weight: 500; cursor: pointer;
    transition: all 0.2s; font-family: 'Manrope', sans-serif;
  }
  .ai-quick-btn:hover { border-color: var(--gold); color: var(--gold); }
  .ai-input-row { padding: 16px 28px 24px; display: flex; gap: 10px; border-top: 1px solid var(--border); }
  .ai-input {
    flex: 1; padding: 12px 16px; border-radius: 12px;
    border: 1.5px solid var(--border); background: var(--cream);
    font-family: 'Manrope', sans-serif; font-size: 0.9rem;
    outline: none; transition: border-color 0.2s;
  }
  .ai-input:focus { border-color: var(--gold); }
  .ai-send {
    padding: 12px 20px; border-radius: 12px;
    background: var(--ink); color: var(--gold);
    border: none; cursor: pointer; font-size: 1rem;
    transition: all 0.2s; font-family: 'Manrope', sans-serif;
  }
  .ai-send:hover { background: #2a2a2a; }
  .ai-send:disabled { opacity: 0.4; cursor: not-allowed; }
  .close-modal {
    position: absolute; top: 16px; right: 16px;
    background: rgba(255,255,255,0.1); border: none; color: var(--white);
    width: 32px; height: 32px; border-radius: 50%; cursor: pointer;
    font-size: 1rem; display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
  }
  .close-modal:hover { background: rgba(255,255,255,0.2); }

  /* ─── LISTING MODAL ─── */
  .listing-modal { max-width: 800px; overflow-y: auto; max-height: 90vh; }
  .listing-modal-gallery { position: relative; height: 300px; background: var(--mist); overflow: hidden; }
  .listing-modal-gallery img { width: 100%; height: 100%; object-fit: cover; }
  .listing-modal-gallery .placeholder-big { display: flex; align-items: center; justify-content: center; height: 100%; font-size: 5rem; opacity: 0.3; }
  .listing-modal-body { padding: 28px 32px; }
  .listing-modal-price { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 700; margin-bottom: 8px; }
  .listing-modal-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 16px; color: #4a4a4a; }
  .listing-modal-tags { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
  .tag { padding: 4px 12px; border-radius: 20px; background: var(--mist); font-size: 0.78rem; font-weight: 600; color: var(--slate); }
  .listing-modal-desc { font-size: 0.9rem; line-height: 1.7; color: #4a4a4a; margin-bottom: 24px; }
  .listing-modal-contact {
    background: linear-gradient(135deg, var(--ink), #2a2a2a);
    border-radius: 14px; padding: 20px 24px; color: var(--white);
    display: flex; justify-content: space-between; align-items: center;
  }
  .contact-info h4 { font-size: 0.9rem; margin-bottom: 4px; }
  .contact-info p { font-size: 0.82rem; opacity: 0.6; }
  .contact-phone { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: var(--gold); font-weight: 700; }
  .btn-contact {
    padding: 10px 24px; border-radius: 40px;
    background: var(--gold); color: var(--white);
    border: none; font-family: 'Manrope', sans-serif; font-size: 0.85rem; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-contact:hover { background: #b8943c; }

  /* ─── WHY ESTA ─── */
  .why-section {
    padding: 80px 40px;
    background: var(--ink);
    color: var(--white);
  }
  .why-inner { max-width: 1200px; margin: 0 auto; }
  .why-title {
    font-family: 'Playfair Display', serif;
    font-size: 2.5rem; font-weight: 700; text-align: center;
    margin-bottom: 16px; letter-spacing: -1px;
  }
  .why-title span { color: var(--gold); font-style: italic; }
  .why-sub { text-align: center; opacity: 0.5; font-size: 0.9rem; margin-bottom: 52px; }
  .why-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 24px; }
  .why-card {
    padding: 28px 24px;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    background: rgba(255,255,255,0.03);
    transition: all 0.3s;
  }
  .why-card:hover { background: rgba(201,168,76,0.08); border-color: rgba(201,168,76,0.3); transform: translateY(-4px); }
  .why-icon { font-size: 2rem; margin-bottom: 16px; }
  .why-card h3 { font-size: 1rem; font-weight: 700; margin-bottom: 8px; }
  .why-card p { font-size: 0.83rem; opacity: 0.55; line-height: 1.6; }

  /* ─── PRICING ─── */
  .pricing-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; max-width: 900px; margin: 0 auto; }
  .pricing-card {
    background: var(--white); border-radius: 20px; padding: 32px 28px;
    border: 2px solid var(--border); position: relative; transition: all 0.3s;
  }
  .pricing-card:hover { border-color: var(--gold); transform: translateY(-4px); box-shadow: 0 20px 40px rgba(0,0,0,0.08); }
  .pricing-card.popular { border-color: var(--gold); }
  .popular-badge {
    position: absolute; top: -14px; left: 50%; transform: translateX(-50%);
    background: var(--gold); color: var(--white);
    padding: 4px 20px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; white-space: nowrap;
  }
  .pricing-plan { font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #8a7e6a; margin-bottom: 8px; }
  .pricing-price { font-family: 'Playfair Display', serif; font-size: 2.5rem; font-weight: 700; margin-bottom: 4px; }
  .pricing-price sup { font-size: 1rem; }
  .pricing-period { font-size: 0.8rem; color: #8a7e6a; margin-bottom: 24px; }
  .pricing-features { list-style: none; margin-bottom: 28px; }
  .pricing-features li {
    padding: 7px 0; font-size: 0.85rem; border-bottom: 1px solid var(--border);
    display: flex; gap: 8px; align-items: flex-start;
  }
  .pricing-features li:last-child { border: none; }
  .pricing-features .check { color: var(--sage); font-weight: 700; }
  .pricing-features .no { color: #ccc; font-weight: 700; }
  .btn-pricing {
    width: 100%; padding: 12px; border-radius: 12px;
    font-family: 'Manrope', sans-serif; font-size: 0.9rem; font-weight: 700;
    cursor: pointer; transition: all 0.2s; border: none;
  }
  .btn-pricing-outline { background: transparent; border: 2px solid var(--ink); color: var(--ink); }
  .btn-pricing-outline:hover { background: var(--ink); color: var(--cream); }
  .btn-pricing-gold { background: var(--gold); color: var(--white); }
  .btn-pricing-gold:hover { background: #b8943c; }

  /* ─── CITIES ─── */
  .cities-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
  .city-card {
    padding: 24px 20px; border-radius: 14px;
    border: 1.5px solid var(--border); background: var(--white);
    cursor: pointer; transition: all 0.2s; text-align: center;
