<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ESTA — Недвижимость</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

header{
background:#111;
color:white;
padding:20px;
font-size:22px;
}

.container{
padding:40px;
max-width:1000px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
margin-bottom:20px;
}

button{
background:black;
color:white;
border:none;
padding:12px 20px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#b5956a;
}

</style>

</head>

<body>

<header>
ESTA — Портал недвижимости
</header>

<div class="container"></div>

<script>

fetch("listings.json")
.then(res => res.json())
.then(data => {

const container = document.querySelector(".container");

data.forEach(home => {

const card = document.createElement("div");
card.className = "card";

card.innerHTML = `
<h2>${home.title}</h2>
<p>${home.city}</p>
<p><b>${home.price}$</b></p>
<img src="${home.image}" width="100%">
`;

container.appendChild(card);

});

});

</script>

</body>
</html>
