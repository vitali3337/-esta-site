<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ESTA — Портал недвижимости</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

header{
background:#111;
color:white;
padding:20px;
font-size:22px;
text-align:center;
}

.filters{
background:white;
padding:20px;
display:flex;
gap:10px;
justify-content:center;
flex-wrap:wrap;
}

.filters input,
.filters select{
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

#map{
height:400px;
margin:20px;
border-radius:10px;
}

.container{
padding:40px;
max-width:1000px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
margin-bottom:20px;
}

.card img{
margin-top:10px;
border-radius:6px;
}

</style>

</head>

<body>

<header>
ESTA — Портал недвижимости
</header>

<div class="filters">

<input id="search" placeholder="AI поиск: 2 комнаты балка до 50000">

<select id="rooms">
<option value="">Комнаты</option>
<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="4">4+</option>
</select>

<input id="price" placeholder="Макс цена">

<select id="district">
<option value="">Район</option>
<option value="балка">Балка</option>
<option value="центр">Центр</option>
</select>

</div>

<div id="map"></div>

<div class="container"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

let homes = []
let map
let markers=[]

fetch("listings.json")
.then(res=>res.json())
.then(data=>{

homes=data

renderHomes(data)
initMap(data)

})

function renderHomes(data){

const container=document.querySelector(".container")
container.innerHTML=""

data.forEach(home=>{

const card=document.createElement("div")
card.className="card"

card.innerHTML=`
<h2>${home.title}</h2>
<p>${home.city}</p>
<p>Комнаты: ${home.rooms}</p>
<p><b>${home.price}$</b></p>
<img src="${home.image}" width="100%">
`

container.appendChild(card)

})

}

function initMap(data){

map=L.map("map").setView([46.8403,29.6433],12)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'© OpenStreetMap'
}).addTo(map)

updateMap(data)

}

function updateMap(data){

markers.forEach(m=>map.removeLayer(m))
markers=[]

data.forEach(home=>{

if(home.lat && home.lng){

const marker=L.marker([home.lat,home.lng])
.addTo(map)
.bindPopup(home.title+" $"+home.price)

markers.push(marker)

}

})

}

function filterHomes(){

const text=document.getElementById("search").value.toLowerCase()
const roomFilter=document.getElementById("rooms").value
const priceFilter=document.getElementById("price").value
const district=document.getElementById("district").value

const filtered=homes.filter(home=>{

if(roomFilter && home.rooms!=roomFilter) return false

if(priceFilter && home.price>priceFilter) return false

if(district && !home.title.toLowerCase().includes(district)) return false

if(text){

let maxPrice=null
let rooms=null

const priceMatch=text.match(/\d{4,6}/)
if(priceMatch) maxPrice=Number(priceMatch[0])

const roomMatch=text.match(/[1-4]/)
if(roomMatch) rooms=Number(roomMatch[0])

if(rooms && home.rooms!=rooms) return false
if(maxPrice && home.price>maxPrice) return false

}

return true

})

renderHomes(filtered)
updateMap(filtered)

}

document.getElementById("search").addEventListener("input",filterHomes)
document.getElementById("rooms").addEventListener("change",filterHomes)
document.getElementById("price").addEventListener("input",filterHomes)
document.getElementById("district").addEventListener("change",filterHomes)

</script>

</body>
  </html>
