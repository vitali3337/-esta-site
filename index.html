<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ESTA Недвижимость</title>

<style>

body{
font-family: Arial;
margin:0;
background:#f4f6fa;
}

header{
background:#0D1B2A;
color:white;
padding:20px;
text-align:center;
font-size:28px;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.cards-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card-body{
padding:15px;
}

.price{
font-size:20px;
font-weight:bold;
color:#D32F2F;
}

.title{
font-size:16px;
margin-top:5px;
}

.city{
font-size:13px;
color:#666;
margin-bottom:5px;
}

.params{
font-size:13px;
color:#777;
}

</style>

</head>

<body>

<header>
ESTA Недвижимость
</header>

<div class="container">

<div id="cards" class="cards-grid">

Загрузка объявлений...

</div>

</div>


<script>

const AIRTABLE_TOKEN = "patHlqaizm9Ey7xnF.886c2e433073a8ef32e3093b0dc3fc3c5416ddaa2d73fbc6c472a09671adea36";

const AIRTABLE_BASE = "appIQflEcagGQpjXQ";

const TABLE = "Listings";


async function loadListings(){

const url = `https://api.airtable.com/v0/${AIRTABLE_BASE}/${TABLE}`;

try{

const response = await fetch(url,{
headers:{
Authorization:`Bearer ${AIRTABLE_TOKEN}`
}
});

const data = await response.json();

const grid = document.getElementById("cards");

grid.innerHTML = "";

if(!data.records || data.records.length===0){

grid.innerHTML="Нет объявлений";

return;

}

data.records.forEach(record=>{

const f = record.fields;

let image="";

if(f["Attachments"]){

image = f["Attachments"][0].url;

}

let city="";

if(f["City"]){

city = f["City"].name || f["City"];

}

const card = `

<div class="card">

${image ? `<img src="${image}">` : ""}

<div class="card-body">

<div class="price">$${f.Price || ""}</div>

<div class="title">${f["Listing Title"] || ""}</div>

<div class="city">📍 ${city}</div>

<div class="params">

🛏 ${f.Rooms || "-"} ком • 📐 ${f["Area(m)"] || "-"} м²

</div>

</div>

</div>

`;

grid.innerHTML += card;

});

}

catch(e){

document.getElementById("cards").innerHTML="Ошибка загрузки данных";

}

}

loadListings();

</script>

</body>
</html>
