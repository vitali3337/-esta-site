<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ESTA — Недвижимость Тирасполя</title>

<style>

body{
font-family: Arial;
background:#0e0f11;
color:white;
margin:0;
}

header{
background:#16181c;
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:26px;
color:#c8b89a;
}

.container{
padding:40px;
max-width:1200px;
margin:auto;
}

.cards-grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
gap:20px;
}

.card{
background:#22262e;
border-radius:10px;
overflow:hidden;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card-body{
padding:16px;
}

.card-title{
font-size:18px;
margin-bottom:10px;
}

.card-price{
font-size:20px;
color:#c8b89a;
margin-bottom:10px;
}

.card-btn{
display:block;
padding:10px;
background:#c8b89a;
color:black;
text-align:center;
text-decoration:none;
border-radius:6px;
}

</style>

</head>

<body>

<header>

<div class="logo">
ESTA PMR
</div>

<div>
Недвижимость Тирасполь
</div>

</header>

<div class="container">

<h1>Актуальные объявления</h1>
<div class="cards-grid"></div>
<div class="cards-grid" id="listings">

Загрузка объявлений...

</div>

</div>

<script>

async function loadListings(){

const API = "https://web-production-e24bc.up.railway.app/listings"

try{

const response = await fetch(API)

const data = await response.json()

const container = document.getElementById("listings")

container.innerHTML = ""

data.listings.forEach(item=>{

const card = document.createElement("div")

card.className = "card"

card.innerHTML = `

<img src="https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?w=800">

<div class="card-body">

<div class="card-title">

${item.title || "Недвижимость"}

</div>

<div class="card-price">

$${item.price || ""}

</div>

<a class="card-btn" href="${item.link}" target="_blank">

Открыть объявление

</a>

</div>

`

container.appendChild(card)

})

}catch(e){

console.log("Ошибка загрузки",e)

}

}

loadListings()

</script>
<script>

const API_URL = "https://web-production-e24bc.up.railway.app";

async function loadListings() {

  try {

    const res = await fetch(API_URL + "/listings");
    const data = await res.json();

    const grid = document.querySelector(".cards-grid");

    if (!grid) return;

    grid.innerHTML = "";

    data.listings.forEach(item => {

      const img = item.img || "https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?w=600";

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <div class="card-img">
          <img src="${img}">
        </div>

        <div class="card-body">

          <div class="card-title">
            ${item.title || "Объект недвижимости"}
          </div>

          <div class="card-meta">
            📍 ${item.district || "Тирасполь"}
          </div>

          <div class="card-price">
            $${item.price || ""}
          </div>

          <div class="card-footer">

            <a href="${item.link || "#"}" target="_blank" class="card-btn">
              Открыть объявление
            </a>

          </div>

        </div>
      `;

      grid.appendChild(card);

    });

  } catch(e) {

    console.log("Ошибка загрузки:", e);

  }

}

loadListings();

</script>
</body>
</html>
