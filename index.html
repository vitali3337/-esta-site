<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<title>ESTA Недвижимость</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
background:#f5f6fa;
margin:0;
}

header{
background:#0d1b2a;
color:white;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.search{
text-align:center;
padding:30px;
}

.search input{
width:60%;
padding:12px;
border-radius:8px;
border:1px solid #ddd;
font-size:16px;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.content{
padding:15px;
}

.price{
color:#e53935;
font-size:22px;
font-weight:bold;
}

.title{
font-size:18px;
margin-top:5px;
}

.loc{
color:#777;
margin-top:5px;
}

.params{
margin-top:10px;
font-size:14px;
color:#444;
}

</style>
</head>

<body>

<header>
ESTA Недвижимость
</header>

<div class="search">
<input id="search" placeholder="Поиск недвижимости...">
</div>

<div class="container">

<div id="listings" class="grid">

Загрузка...

</div>

</div>

<script>

const AIRTABLE_TOKEN = "patHlqaizm9Ey7xnF. 886c2e433073a8ef32e3093b0dc3fc3c5416ddaa2d73fbc6c472a09671adea36";
const BASE = "appIQfIEcagGQpjXQ";
const TABLE = "Listings";

async function load(){

const url = `https://api.airtable.com/v0/${BASE}/${TABLE}`;

const res = await fetch(url,{
headers:{
Authorization:`Bearer ${AIRTABLE_TOKEN}`
}
});

const data = await res.json();

let html = "";

data.records.forEach(item=>{

const f = item.fields;

let img = "";

if(f.Attachments){
img = f.Attachments[0].url;
}

html+=`

<div class="card">

<img src="${img}">

<div class="content">

<div class="price">
$${f.Price || ""}
</div>

<div class="title">
${f["Listing Title"] || ""}
</div>

<div class="loc">
📍 ${f.City || ""}
</div>

<div class="params">
🛏 ${f.Rooms || ""} комнат • 📐 ${f["Area(m²)"] || ""} м²
</div>

</div>

</div>

`;

});

document.getElementById("listings").innerHTML = html;

}

load();

</script>

</body>
</html>
