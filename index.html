<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ESTA Недвижимость</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#f2f2f2;
}

header{
background:black;
color:white;
padding:20px;
text-align:center;
font-size:28px;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card-content{
padding:15px;
}

.price{
font-size:20px;
font-weight:bold;
color:#2e7d32;
}

.city{
color:#666;
}

</style>
</head>

<body>

<header>
ESTA Недвижимость
</header>

<div class="container">

<div id="listingsGrid" class="grid">

Загрузка объявлений...

</div>

</div>


<script>

const AIRTABLE_TOKEN="patHlqaizm9Ey7xnF.886c2e433073a8ef32e3093b0dc3fc3c5416ddaa2d73fbc6c472a09671adea36";
const AIRTABLE_BASE="appIQflEcagGQpjXQ";
const TABLE="Listings";

async function fetchListings(){

const url=`https://api.airtable.com/v0/${AIRTABLE_BASE}/${TABLE}`;

try{

const response=await fetch(url,{
headers:{
Authorization:`Bearer ${AIRTABLE_TOKEN}`
}
});

const data=await response.json();

const grid=document.getElementById("listingsGrid");

grid.innerHTML="";

if(!data.records || data.records.length===0){
grid.innerHTML="Нет объявлений";
return;
}

data.records.forEach(record=>{

const f=record.fields;

const title=f["Listing Title"]||"";
const price=f["Price"]||"";
const rooms=f["Rooms"]||"";
const area=f["Area(m)"]||"";

let city="";
if(f["City"]){
city=f["City"].name||f["City"];
}

let image="";

if(f["Attachments"]){
image=f["Attachments"][0].url;
}

const card=document.createElement("div");

card.className="card";

card.innerHTML=`

<img src="${image}">

<div class="card-content">

<h3>${title}</h3>

<div class="city">📍 ${city}</div>

<div class="price">$${price}</div>

<div>${rooms} комнат • ${area} м²</div>

</div>

`;

grid.appendChild(card);

});

}catch(e){

document.getElementById("listingsGrid").innerHTML="Ошибка подключения Airtable";

}

}

fetchListings();

</script>

</body>
</html>
