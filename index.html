<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ESTA — Недвижимость</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f3f5f9;
}

/* HEADER */

header{
background:#0D1B2A;
padding:20px;
color:white;
}

.header-container{
max-width:1200px;
margin:auto;
display:flex;
align-items:center;
justify-content:space-between;
}

.logo{
font-size:28px;
font-weight:bold;
}

.add-btn{
background:#2ecc71;
padding:10px 20px;
border-radius:6px;
color:white;
font-weight:bold;
}

/* SEARCH */

.search-bar{
max-width:900px;
margin:30px auto;
display:flex;
gap:10px;
}

.search-bar input{
flex:1;
padding:15px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
}

.search-bar button{
background:#1565C0;
color:white;
border:none;
padding:15px 25px;
border-radius:8px;
}

/* CATEGORIES */

.categories{
max-width:1200px;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(150px,1fr));
gap:15px;
padding:20px;
}

.cat{
background:white;
padding:20px;
border-radius:10px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
cursor:pointer;
}

/* GRID */

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
gap:20px;
}

/* CARD */

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 8px 25px rgba(0,0,0,0.08);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card-body{
padding:15px;
}

.price{
font-size:24px;
color:#D32F2F;
font-weight:bold;
}

.title{
font-size:18px;
margin-top:5px;
}

.loc{
color:#666;
margin-top:3px;
}

.params{
margin-top:8px;
color:#444;
font-size:14px;
}

</style>

</head>

<body>

<header>

<div class="header-container">

<div class="logo">ESTA</div>

<div class="add-btn">
+ Подать объявление
</div>

</div>

</header>

<div class="search-bar">

<input id="searchInput" placeholder="Поиск квартир, домов...">

<button>Найти</button>

</div>

<div class="categories">

<div class="cat">🏢 Квартиры</div>
<div class="cat">🏠 Дома</div>
<div class="cat">🌿 Участки</div>
<div class="cat">🏬 Коммерческая</div>
<div class="cat">🚗 Гаражи</div>

</div>

<div class="container">

<div class="grid" id="cards">

Загрузка объявлений...

</div>

</div>

<script>

const AIRTABLE_TOKEN="patHlqaizm9Ey7xnF.886c2e433073a8ef32e3093b0dc3fc3c5416ddaa2d73fbc6c472a09671adea36";
const BASE_ID="appIQflEcagGQpjXQ";
const TABLE="Listings";

let DATA=[];

async function load(){

const url=`https://api.airtable.com/v0/${BASE_ID}/${TABLE}`;

const res=await fetch(url,{
headers:{
Authorization:`Bearer ${AIRTABLE_TOKEN}`
}
});

const json=await res.json();

DATA=json.records;

render(DATA);

}

function render(items){

const grid=document.getElementById("cards");

grid.innerHTML="";

items.forEach(r=>{

const f=r.fields;

let img="";

if(f.Attachments){
img=f.Attachments[0].url;
}

const card=`

<div class="card">

<img src="${img || "https://via.placeholder.com/600x300"}">

<div class="card-body">

<div class="price">$${f.Price || ""}</div>

<div class="title">${f["Listing Title"] || ""}</div>

<div class="loc">📍 ${f.City || ""}</div>

<div class="params">

🛏 ${f.Rooms || ""} комн
📐 ${f["Area(m)"] || ""} м²

</div>

</div>

</div>

`;

grid.innerHTML+=card;

});

}

document.getElementById("searchInput").addEventListener("input",function(){

const q=this.value.toLowerCase();

const filtered=DATA.filter(r=>{
const title=(r.fields["Listing Title"] || "").toLowerCase();
return title.includes(q);
});

render(filtered);

});

load();

</script>

</body>
</html>
