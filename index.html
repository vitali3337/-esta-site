<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ESTA Недвижимость</title>

<style>

body{
font-family:Arial, sans-serif;
background:#f2f2f2;
margin:0;
padding:0;
}

header{
background:#111;
color:white;
padding:20px;
text-align:center;
font-size:24px;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.body{
padding:15px;
}

.price{
font-size:20px;
font-weight:bold;
color:#27ae60;
}

.title{
font-size:16px;
margin-top:5px;
}

.city{
font-size:14px;
color:#777;
}

</style>

</head>

<body>

<header>
ESTA Недвижимость
</header>

<div class="container">

<div id="listingsGrid" class="grid">
Загрузка объявлений...
</div>

</div>

<script>

const AIRTABLE_TOKEN = "patHlqaizm9Ey7xnF886c2e433073a8ef32e3093b0dc3fc3c5416ddaa2d73fbc6c472a09671adea36";
const AIRTABLE_BASE = "appIQflEcagGQpjXQ";
const TABLE = "Listings";

async function fetchListings(){

const url = `https://api.airtable.com/v0/${AIRTABLE_BASE}/${TABLE}`;

try{

const response = await fetch(url,{
headers:{
Authorization:`Bearer ${AIRTABLE_TOKEN}`
}
});

const data = await response.json();

renderListings(data.records);

}

catch(error){

document.getElementById("listingsGrid").innerHTML="Ошибка загрузки данных";

}

}

function renderListings(records){

const grid = document.getElementById("listingsGrid");

if(!records || records.length === 0){

grid.innerHTML="Нет объявлений";

return;

}

grid.innerHTML = records.map(record => {

const f = record.fields;

let image = "";

if(f.Attachments && f.Attachments.length > 0){

image = f.Attachments[0].url;

}

return `

<div class="card">

<img src="${image}">

<div class="body">

<div class="price">${f.Price || ""}</div>

<div class="title">${f["Listing Title"] || ""}</div>

<div class="city">${f.City || ""}</div>

</div>

</div>

`;

}).join("");

}

fetchListings();

</script>

</body>
</html>
