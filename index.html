<style>
/* ══════════════════════════════════════════
   ESTA — Design System
   Palette: Deep Navy + Warm Cream + Gold
══════════════════════════════════════════ */
:root {
  --navy:    #0d1b2a;
  --navy2:   #152236;
  --navy3:   #1e3250;
  --cream:   #f8f4ee;
  --cream2:  #f0ebe2;
  --cream3:  #e8e1d6;
  --white:   #ffffff;
  --ink:     #1a1410;
  --muted:   #8a8278;
  --gold:    #c9953e;
  --gold2:   #e0b468;
  --gold3:   #f5e6c8;
  --gold4:   #fdf6e8;
  --green:   #1a6b3c;
  --border:  rgba(201,149,62,.15);
  --borderN: rgba(255,255,255,.08);
  --r:  8px;
  --r2: 16px;
  --r3: 24px;
  --sh:  0 2px 16px rgba(13,27,42,.06);
  --sh2: 0 8px 40px rgba(13,27,42,.14);
  --sh3: 0 24px 80px rgba(13,27,42,.22);
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; font-size: 14px; }
body { font-family: 'Outfit', sans-serif; background: var(--cream); color: var(--ink); line-height: 1.6; }
a { text-decoration: none; color: inherit; }
img { display: block; max-width: 100%; }
button, input, select, textarea { font-family: inherit; }
::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: var(--cream2); } ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 3px; }

/* ═══ NAV ═══ */
.nav {
  position: sticky; top: 0; z-index: 400;
  height: 60px; display: flex; align-items: center; padding: 0 24px; gap: 12px;
  background: rgba(248,244,238,.96); backdrop-filter: blur(24px) saturate(1.3);
  border-bottom: 1px solid var(--border);
}
.logo { font-family: 'Playfair Display', serif; font-size: 21px; font-weight: 700; letter-spacing: -.3px; flex-shrink: 0; }
.logo span { color: var(--gold); }
.ntabs { display: flex; gap: 0; }
.nt { padding: 6px 14px; background: transparent; border: none; font-size: 13px; font-weight: 500; color: var(--muted); cursor: pointer; border-radius: 7px; transition: all .15s; }
.nt:hover { color: var(--ink); background: var(--cream2); }
.nt.active { color: var(--gold); background: var(--gold4); }
.nav-srch { flex: 1; max-width: 280px; position: relative; }
.nav-srch input { width: 100%; padding: 7px 12px 7px 34px; background: var(--cream2); border: 1.5px solid transparent; border-radius: 9px; font-size: 12.5px; outline: none; transition: all .2s; }
.nav-srch input:focus { border-color: var(--gold); background: var(--white); }
.nav-srch .si { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 13px; pointer-events: none; }
.nav-r { margin-left: auto; display: flex; align-items: center; gap: 8px; }
.lang-sw { display: flex; background: var(--cream2); border-radius: 7px; padding: 2px; }
.lb { padding: 3px 9px; border-radius: 5px; border: none; font-size: 11px; font-weight: 700; color: var(--muted); background: transparent; cursor: pointer; transition: all .15s; }
.lb.on { background: var(--white); color: var(--gold); }
.nbtn { padding: 7px 16px; border-radius: 8px; border: none; font-size: 12.5px; font-weight: 600; cursor: pointer; transition: all .18s; }
.nbtn-ghost { background: transparent; border: 1.5px solid var(--border); color: var(--ink); }
.nbtn-ghost:hover { border-color: var(--gold); color: var(--gold); }
.nbtn-solid { background: var(--navy); color: var(--white); }
.nbtn-solid:hover { background: var(--gold); }
.nbtn-ai { background: linear-gradient(135deg,#1e1060,#4731c8); color: var(--white); display: flex; align-items: center; gap: 5px; }
.nbtn-ai:hover { opacity: .88; }

/* ═══ HERO ═══ */
.hero {
  background: var(--navy);
  padding: 64px 24px 0;
  position: relative; overflow: hidden;
  min-height: 520px;
}
.hero::before {
  content: '';
  position: absolute; inset: 0;
  background: url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=1600&q=40') center/cover;
  opacity: .08;
}
.hero::after {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0; height: 200px;
  background: linear-gradient(to bottom, transparent, var(--cream));
  z-index: 2;
}
.hero-in { max-width: 1160px; margin: 0 auto; position: relative; z-index: 3; }
.hero-badge {

  padding: 5px 14px; border-radius: 20px; margin-bottom: 24px; text-transform: uppercase;
}
.hero-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--gold); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.3;transform:scale(.8)} }
.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(32px, 5vw, 68px);
  font-weight: 700; color: var(--white); line-height: 1.06;
  margin-bottom: 16px;
}
.hero h1 em { font-style: italic; color: var(--gold2); }
.hero-sub { font-size: 14px; color: rgba(255,255,255,.42); max-width: 500px; margin-bottom: 32px; font-weight: 300; line-height: 1.8; }
.hero-stats { display: flex; gap: 36px; margin-bottom: 36px; }
.hs { }
.hs-n { font-family: 'Playfair Display', serif; font-size: 32px; color: var(--white); font-weight: 700; line-height: 1; }
.hs-l { font-size: 10px; color: rgba(255,255,255,.32); text-transform: uppercase; letter-spacing: 2px; margin-top: 3px; }

/* ═══ SEARCH BOX ═══ */
.sbox {
  background: var(--white);
  border-radius: var(--r3) var(--r3) 0 0;
  padding: 24px 28px 28px;
  box-shadow: 0 -20px 60px rgba(0,0,0,.3);

}
.sbox-tabs { display: flex; border-bottom: 2px solid var(--cream2); margin-bottom: 20px; }
.sbt { padding: 8px 18px; background: transparent; border: none; font-size: 13px; font-weight: 600; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all .15s; }
.sbt.on { color: var(--gold); border-bottom-color: var(--gold); }
.sbox-row { display: grid; grid-template-columns: 1.4fr 1fr 100px 100px auto; gap: 10px; align-items: end; }
.sf { display: flex; flex-direction: column; gap: 4px; }
.sf label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; color: var(--muted); }
.sf select, .sf input {
  background: var(--cream2); border: 1.5px solid transparent;
  border-radius: var(--r); padding: 10px 12px; font-size: 13px; color: var(--ink); outline: none;
  transition: all .18s;
}
.sf select:focus, .sf input:focus { border-color: var(--gold); background: var(--white); box-shadow: 0 0 0 3px rgba(201,149,62,.08); }
.go-btn {
  background: var(--navy); color: var(--white); border: none;
  padding: 10px 22px; border-radius: var(--r); font-size: 14px; font-weight: 700;
  cursor: pointer; transition: background .2s; white-space: nowrap;
  display: flex; align-items: center; gap: 6px;
}
.go-btn:hover { background: var(--gold); }
.ai-teaser {
  margin-top: 14px;
  background: linear-gradient(135deg, #0d1240, #1e1580);
  border-radius: 10px; padding: 11px 16px;
  display: flex; align-items: center; gap: 12px; cursor: pointer;
  transition: opacity .18s; border: 1px solid rgba(255,255,255,.06);
}
.ai-teaser:hover { opacity: .9; }
.at-star { font-size: 18px; flex-shrink: 0; }
.at-txt { font-size: 12.5px; color: rgba(255,255,255,.75); }
.at-txt strong { color: var(--white); font-weight: 700; }
.at-arr { margin-left: auto; font-size: 11px; font-weight: 700; color: rgba(255,255,255,.4); white-space: nowrap; }

/* ═══ API NOTICE ═══ */
.notice { display: none; background: #fff8e1; border-left: 3px solid var(--gold); padding: 10px 18px; font-size: 12.5px; color: #7a5c00; }
.notice.show { display: block; }

/* ═══ AI PANEL ═══ */
.ai-wrap { max-width: 1160px; margin: 0 auto; padding: 0 24px; }
.ai-panel {
  background: linear-gradient(150deg, #080c20, #0f1940, #1a1060);
  border-radius: var(--r2); border: 1px solid rgba(99,88,220,.2);
  padding: 28px 32px; display: none; margin-top: 4px;
}
.ai-panel.open { display: block; animation: rise .25s ease; }
@keyframes rise { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }
.ai-hd { display: flex; align-items: center; gap: 14px; margin-bottom: 18px; }
.ai-ico { width: 42px; height: 42px; border-radius: 12px; background: linear-gradient(135deg,#3b2fa5,#6355e4); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
.ai-title { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--white); }
.ai-sub { font-size: 11px; color: rgba(255,255,255,.3); margin-top: 2px; }
.ai-close { margin-left: auto; width: 28px; height: 28px; border-radius: 50%; background: rgba(255,255,255,.07); border: none; color: rgba(255,255,255,.4); font-size: 17px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.ai-row { display: flex; gap: 9px; margin-bottom: 12px; }
.ai-input {
  flex: 1; background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.1);
  color: var(--white); padding: 12px 16px; border-radius: 10px; font-size: 13.5px; outline: none;
  transition: border-color .18s;
}
.ai-input:focus { border-color: rgba(99,88,220,.5); }
.ai-input::placeholder { color: rgba(255,255,255,.22); }
.ai-go { background: linear-gradient(135deg,#3b2fa5,#6355e4); color: var(--white); border: none; padding: 12px 20px; border-radius: 10px; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; }
.chips { display: flex; flex-wrap: wrap; gap: 6px; }
.chip { padding: 5px 12px; border-radius: 20px; border: 1px solid rgba(255,255,255,.1); background: rgba(255,255,255,.04); color: rgba(255,255,255,.55); font-size: 11.5px; cursor: pointer; transition: all .15s; }
.chip:hover { border-color: rgba(99,88,220,.5); color: var(--white); background: rgba(99,88,220,.15); }
.ai-result-box { margin-top: 18px; }
.ai-comment { background: rgba(255,255,255,.05); border-left: 3px solid #6355e4; border-radius: 8px; padding: 11px 16px; font-size: 13px; color: rgba(255,255,255,.7); margin-bottom: 14px; line-height: 1.75; }
.ai-cards { display: grid; grid-template-columns: repeat(auto-fill,minmax(200px,1fr)); gap: 12px; }
.ai-card { background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.08); border-radius: 10px; overflow: hidden; cursor: pointer; transition: border-color .18s; }
.ai-card:hover { border-color: rgba(99,88,220,.45); }
.ai-card img { width: 100%; height: 110px; object-fit: cover; }
.ai-cb { padding: 10px 12px; }
.ai-ct { font-size: 12px; font-weight: 600; color: var(--white); line-height: 1.4; display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden; margin-bottom: 4px; }
.ai-cp { font-family: 'Playfair Display', serif; font-size: 17px; color: var(--gold2); }
.ai-cr { font-size: 10.5px; color: rgba(255,255,255,.3); margin-top: 3px; line-height: 1.5; }
.ai-cbtn { width: 100%; margin-top: 8px; background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.1); color: rgba(255,255,255,.75); padding: 6px; border-radius: 6px; font-size: 11px; font-weight: 600; cursor: pointer; }
.ai-spin { display: flex; align-items: center; gap: 10px; color: rgba(255,255,255,.4); font-size: 13px; padding: 14px 0; }
.spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.1); border-top-color: #6355e4; border-radius: 50%; animation: spin .7s linear infinite; }

/* ═══ CITIES ═══ */
.cities-bar { background: var(--white); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 26px 24px; }
.cities-in { max-width: 1160px; margin: 0 auto; }
.sec-lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); margin-bottom: 12px; }

  cursor: pointer; transition: all .2s; font-size: 13px; font-weight: 500;
}

/* ═══ MAIN LAYOUT ═══ */
.main { max-width: 1160px; margin: 28px auto; padding: 0 24px; display: grid; grid-template-columns: 220px 1fr; gap: 20px; align-items: start; }

/* ═══ SIDEBAR ═══ */
.sidebar { background: var(--white); border: 1px solid var(--border); border-radius: var(--r2); padding: 18px; position: sticky; top: 70px; }
.sb-hd { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.sb-lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); }
.sb-reset { font-size: 11.5px; color: var(--gold); font-weight: 600; background: none; border: none; cursor: pointer; }
.fld { margin-bottom: 13px; }
.fld label { display: block; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 5px; }
.fld select, .fld input { width: 100%; background: var(--cream2); border: 1.5px solid transparent; border-radius: 7px; padding: 8px 10px; font-size: 12.5px; color: var(--ink); outline: none; transition: border-color .18s; }
.fld select:focus, .fld input:focus { border-color: var(--gold); }
.price-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.cb-group { display: flex; flex-direction: column; gap: 6px; }
.cb-item { display: flex; align-items: center; gap: 7px; font-size: 12.5px; cursor: pointer; }

.sb-div { height: 1px; background: var(--border); margin: 13px 0; }
.apply-btn {

  transition: background .2s; margin-top: 4px;
}

/* ═══ LISTINGS AREA ═══ */
.list-top { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
.list-count { font-size: 13px; color: var(--muted); margin-right: auto; }
.list-count strong { color: var(--ink); font-size: 15px; }
.sort-sel { background: var(--cream2); border: 1.5px solid var(--border); color: var(--ink); padding: 7px 11px; border-radius: 7px; font-size: 12.5px; outline: none; cursor: pointer; }
.view-btns { display: flex; gap: 3px; }
.vbtn { width: 32px; height: 32px; border-radius: 7px; border: 1.5px solid var(--border); background: transparent; color: var(--muted); font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .15s; }
.vbtn.on, .vbtn:hover { border-color: var(--gold); color: var(--gold); background: var(--gold4); }

/* ═══ CARDS ═══ */
.grid-view { display: grid; grid-template-columns: repeat(auto-fill, minmax(248px,1fr)); gap: 14px; }
.list-view { display: flex; flex-direction: column; gap: 11px; }
.prop-card {
  background: var(--white); border: 1px solid var(--border); border-radius: var(--r2);
  overflow: hidden; cursor: pointer; transition: all .25s;
  animation: rise .35s ease both;
}
.prop-card:hover { transform: translateY(-4px); box-shadow: var(--sh3); border-color: var(--gold2); }
.card-img { height: 185px; overflow: hidden; background: var(--cream2); position: relative; flex-shrink: 0; }
.card-img img { width: 100%; height: 100%; object-fit: cover; transition: transform .45s; }

.badge { font-size: 9.5px; font-weight: 700; padding: 3px 8px; border-radius: 5px; letter-spacing: .5px; }
.b-vip { background: rgba(201,149,62,.92); color: var(--white); }
.b-type { background: rgba(13,27,42,.76); color: var(--white); }
.fav { position: absolute; top: 9px; right: 9px; width: 28px; height: 28px; border-radius: 50%; background: rgba(255,255,255,.92); border: none; font-size: 13px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform .15s; }
.fav:active { transform: scale(.88); }
.fav.on { color: #e53e3e; }
.card-body { padding: 13px 15px 16px; }
.card-title { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 500; line-height: 1.4; margin-bottom: 6px; display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden; }
.card-meta { display: flex; flex-wrap: wrap; gap: 4px; font-size: 10.5px; color: var(--muted); margin-bottom: 9px; line-height: 1.6; }
.card-price { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: var(--navy); }
.card-sub { font-size: 10px; color: var(--muted); margin-top: 1px; }
.card-btns { display: flex; gap: 6px; margin-top: 12px; }
.cbtn2 { flex: 1; padding: 8px; border-radius: 8px; border: 1.5px solid var(--border); background: transparent; font-size: 11.5px; font-weight: 600; cursor: pointer; transition: all .18s; color: var(--muted); }
.cbtn2:hover { border-color: var(--gold); color: var(--gold); }
.cbtn2.prim { background: var(--navy); color: var(--white); border-color: var(--navy); }
.cbtn2.prim:hover { background: var(--gold); border-color: var(--gold); }

/* list card variant */
.list-card { flex-direction: row; }

  display: block; width: 100%; margin-top: 20px;
  background: var(--cream2); border: 1.5px solid var(--border);

  font-size: 13.5px; font-weight: 700; cursor: pointer;
  transition: all .2s; text-align: center;
}

/* ═══ MAP ═══ */
.map-section { max-width: 1160px; margin: 28px auto; padding: 0 24px; }
.map-hd { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; }
.sec-title { font-family: 'Playfair Display'
