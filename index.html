<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESTA — Недвижимость Молдовы и Приднестровья</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
:root {
  --bg:     #f5f2ee;
  --bg2:    #ede9e3;
  --white:  #ffffff;
  --ink:    #1a1810;
  --ink2:   #2d2a24;
  --muted:  #8a857c;
  --sand:   #b5956a;
  --sand2:  #d4b896;
  --sand3:  #f0e6d8;
  --green:  #2d6a4f;
  --red:    #c1440e;
  --ai:     #4a3f8c;
  --ai2:    #7c6dfa;
  --border: rgba(181,149,106,0.2);
  --shadow: 0 4px 24px rgba(26,24,16,0.08);
  --r:      12px;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;}
img{max-width:100%;display:block;}
a{text-decoration:none;color:inherit;}
button{cursor:pointer;font-family:'Nunito',sans-serif;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:var(--bg2);}
::-webkit-scrollbar-thumb{background:var(--sand2);border-radius:3px;}

/* ══ NAV ══ */
.nav {
  position:sticky;top:0;z-index:100;
  background:rgba(245,242,238,.95);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:0 32px; display:flex;align-items:center;gap:24px;height:64px;
}
.nav-logo {
  font-family:'Playfair Display',serif;font-size:22px;font-weight:700;
  color:var(--ink);letter-spacing:.5px;margin-right:8px;
}
.nav-logo span{color:var(--sand);}
.nav-region {
  display:flex;gap:4px;background:var(--bg2);border-radius:8px;padding:3px;
}
.nr-btn {
  padding:5px 14px;border-radius:6px;border:none;background:transparent;
  font-size:12px;font-weight:600;color:var(--muted);transition:all .18s;
}
.nr-btn.active{background:var(--white);color:var(--ink);box-shadow:0 1px 4px rgba(0,0,0,.1);}
.nav-links{display:flex;gap:4px;margin-left:auto;}
.nav-link{padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;color:var(--muted);border:none;background:transparent;transition:all .18s;}
.nav-link:hover{background:var(--bg2);color:var(--ink);}
.nav-link.primary{background:var(--ink);color:#fff;}
.nav-link.primary:hover{background:var(--ink2);}
.nav-ai{background:linear-gradient(135deg,var(--ai),var(--ai2));color:#fff!important;}
.nav-ai:hover{opacity:.9;}
.nav-lang{display:flex;gap:2px;margin-left:8px;}
.lang-btn{padding:5px 10px;border-radius:6px;border:none;font-size:11px;font-weight:700;color:var(--muted);background:transparent;transition:all .15s;letter-spacing:.5px;}
.lang-btn.active{background:var(--sand3);color:var(--sand);}

/* ══ HERO ══ */
.hero {
  background:linear-gradient(160deg,var(--ink) 0%,var(--ink2) 60%,#3d2f1a 100%);
  padding:64px 32px 0; position:relative; overflow:hidden;
}
.hero::before {
  content:''; position:absolute; inset:0;
  background:url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?w=1400&q=60') center/cover;
  opacity:.12;
}
.hero-inner { max-width:1100px; margin:0 auto; position:relative; }
.hero-tag {
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(181,149,106,.15);border:1px solid rgba(181,149,106,.3);
  color:var(--sand2);font-size:11px;font-weight:700;letter-spacing:2px;
  padding:5px 14px;border-radius:20px;margin-bottom:20px;text-transform:uppercase;
}
.hero-tag .dot{width:6px;height:6px;border-radius:50%;background:var(--sand);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.hero h1 {
  font-family:'Playfair Display',serif;
  font-size:clamp(36px,5vw,64px);font-weight:700;color:#fff;
  line-height:1.1;margin-bottom:16px;
}
.hero h1 em{font-style:italic;color:var(--sand2);}
.hero-sub{font-size:16px;color:rgba(255,255,255,.6);max-width:520px;margin-bottom:40px;}

/* ══ SEARCH BOX ══ */
.search-box {
  background:var(--white);border-radius:16px 16px 0 0;
  padding:24px 28px 0; box-shadow:0 -8px 40px rgba(0,0,0,.3);
}
.search-tabs{display:flex;gap:0;margin-bottom:20px;border-bottom:2px solid var(--bg2);}
.st{padding:10px 20px;border:none;background:transparent;font-family:'Nunito',sans-serif;font-size:14px;font-weight:600;color:var(--muted);transition:all .18s;border-bottom:2px solid transparent;margin-bottom:-2px;}
.st.active{color:var(--sand);border-bottom-color:var(--sand);}
.search-row{display:grid;grid-template-columns:1fr 1fr 140px 140px auto;gap:12px;align-items:end;padding-bottom:24px;}
.sf{display:flex;flex-direction:column;gap:5px;}
.sf label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.sf select,.sf input{
  background:var(--bg2);border:1.5px solid transparent;color:var(--ink);
  padding:10px 14px;border-radius:9px;font-family:'Nunito',sans-serif;
  font-size:13px;font-weight:500;outline:none;transition:border-color .18s;
}
.sf select:focus,.sf input:focus{border-color:var(--sand);}
.sf input::placeholder{color:var(--muted);}
.search-btn{
  background:var(--ink);color:#fff;border:none;
  padding:11px 28px;border-radius:9px;font-family:'Nunito',sans-serif;
  font-size:14px;font-weight:700;transition:all .2s;white-space:nowrap;
}
.search-btn:hover{background:var(--sand);}
.ai-search-hint{
  background:linear-gradient(135deg,rgba(74,63,140,.08),rgba(124,109,250,.05));
  border:1px solid rgba(74,63,140,.15);border-radius:0 0 12px 12px;
  padding:12px 28px;display:flex;align-items:center;gap:12px;
  cursor:pointer;transition:all .2s;
}
.ai-search-hint:hover{background:linear-gradient(135deg,rgba(74,63,140,.14),rgba(124,109,250,.08));}
.ai-hint-text{font-size:13px;color:var(--ai);}
.ai-hint-text strong{font-weight:700;}

/* ══ STATS BAR ══ */
.stats-bar{background:var(--white);border-bottom:1px solid var(--border);padding:14px 32px;}
.stats-inner{max-width:1100px;margin:0 auto;display:flex;gap:32px;align-items:center;}
.stat-item{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);}
.stat-item strong{font-size:18px;font-weight:700;color:var(--ink);font-family:'Playfair Display',serif;}
.stats-bar .divider{width:1px;height:24px;background:var(--border);}

/* ══ MAIN LAYOUT ══ */
.main-layout{max-width:1100px;margin:0 auto;padding:28px 32px;display:grid;grid-template-columns:260px 1fr;gap:24px;align-items:start;}

/* ══ FILTERS SIDEBAR ══ */
.filters{background:var(--white);border-radius:var(--r);border:1px solid var(--border);padding:20px;position:sticky;top:80px;}
.filters-title{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;}
.filters-reset{font-size:11px;color:var(--sand);font-weight:600;background:none;border:none;cursor:pointer;}
.filter-group{margin-bottom:18px;}
.filter-group label{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
.filter-group select,.filter-group input{width:100%;background:var(--bg2);border:1.5px solid transparent;color:var(--ink);padding:9px 12px;border-radius:8px;font-family:'Nunito',sans-serif;font-size:13px;outline:none;transition:border-color .18s;}
.filter-group select:focus,.filter-group input:focus{border-color:var(--sand);}
.price-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.filter-apply{width:100%;background:var(--ink);color:#fff;border:none;padding:11px;border-radius:8px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;transition:background .2s;margin-top:4px;}
.filter-apply:hover{background:var(--sand);}

/* ══ LISTINGS AREA ══ */
.listings-area{}
.listings-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.listings-count{font-size:14px;color:var(--muted);}
.listings-count strong{color:var(--ink);font-weight:700;}
.view-toggle{display:flex;gap:4px;}
.vt-btn{padding:7px 10px;border-radius:7px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-size:14px;transition:all .18s;}
.vt-btn.active,.vt-btn:hover{border-color:var(--sand);color:var(--sand);}
.sort-select{background:var(--bg2);border:1.5px solid var(--border);color:var(--ink);padding:7px 12px;border-radius:8px;font-family:'Nunito',sans-serif;font-size:12px;outline:none;}

/* ══ GRID VIEW ══ */
.listings-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:18px;}
.listings-list-view{display:flex;flex-direction:column;gap:14px;}

/* ══ CARD ══ */
.card{
  background:var(--white);border:1px solid var(--border);border-radius:var(--r);
  overflow:hidden;transition:transform .22s,box-shadow .22s,border-color .22s;
  animation:cardIn .3s ease both;
}
.card:hover{transform:translateY(-4px);box-shadow:0 16px 40px rgba(26,24,16,.12);border-color:var(--sand2);}
@keyframes cardIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.card-img{height:180px;overflow:hidden;background:var(--bg2);position:relative;}
.card-img img{width:100%;height:100%;object-fit:cover;transition:transform .35s;}
.card:hover .card-img img{transform:scale(1.06);}
.card-badges{position:absolute;top:10px;left:10px;display:flex;gap:6px;flex-wrap:wrap;}
.badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:5px;backdrop-filter:blur(4px);}
.badge-vip{background:rgba(181,149,106,.9);color:#fff;}
.badge-new{background:rgba(45,106,79,.9);color:#fff;}
.badge-type{background:rgba(26,24,16,.75);color:#fff;}
.card-fav{position:absolute;top:10px;right:10px;width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.9);border:none;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .18s;}
.card-fav:hover,.card-fav.active{background:#fff;color:#e53;transform:scale(1.1);}
.card-body{padding:14px 16px 16px;}
.card-title{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--ink);margin-bottom:6px;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.card-meta{display:flex;gap:10px;font-size:11px;color:var(--muted);margin-bottom:10px;flex-wrap:wrap;}
.card-meta span{display:flex;align-items:center;gap:3px;}
.card-price{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--ink);margin-bottom:3px;}
.card-price-rub{font-size:11px;color:var(--muted);}
.card-footer{display:flex;gap:8px;margin-top:12px;}
.card-btn{flex:1;padding:8px;border-radius:8px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-family:'Nunito',sans-serif;font-size:12px;font-weight:600;transition:all .18s;}
.card-btn:hover{border-color:var(--sand);color:var(--sand);}
.card-btn.primary{background:var(--ink);color:#fff;border-color:var(--ink);}
.card-btn.primary:hover{background:var(--sand);border-color:var(--sand);}

/* ══ LIST CARD ══ */
.list-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;display:grid;grid-template-columns:220px 1fr;transition:all .22s;}
.list-card:hover{box-shadow:var(--shadow);border-color:var(--sand2);}
.list-card .card-img{height:100%;min-height:140px;border-radius:0;}
.list-card .card-body{padding:16px 20px;display:flex;flex-direction:column;justify-content:space-between;}
.list-card .card-title{font-size:17px;-webkit-line-clamp:1;}
.list-card .card-desc{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.list-card .card-footer{margin-top:0;}

/* ══ EMPTY STATE ══ */
.empty{text-align:center;padding:64px 20px;color:var(--muted);}
.empty-icon{font-size:56px;margin-bottom:16px;}
.empty h3{font-family:'Playfair Display',serif;font-size:22px;color:var(--ink);margin-bottom:8px;}

/* ══ LOADING ══ */
.skeleton{background:linear-gradient(90deg,var(--bg2) 25%,var(--bg) 50%,var(--bg2) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-card{height:300px;border-radius:var(--r);}

/* ══ AI PANEL ══ */
.ai-panel{
  display:none;background:linear-gradient(135deg,#1a1535,#2d2460);
  border-radius:20px;padding:32px;margin-bottom:28px;
  border:1px solid rgba(124,109,250,.3);
}
.ai-panel.show{display:block;animation:cardIn .3s ease;}
.ai-panel-header{display:flex;align-items:center;gap:14px;margin-bottom:20px;}
.ai-logo{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,var(--ai),var(--ai2));display:flex;align-items:center;justify-content:center;font-size:20px;}
.ai-title{font-family:'Playfair Display',serif;font-size:20px;color:#fff;}
.ai-sub{font-size:12px;color:rgba(255,255,255,.5);}
.ai-input-row{display:flex;gap:10px;margin-bottom:14px;}
.ai-ta{flex:1;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#fff;padding:12px 16px;border-radius:10px;font-family:'Nunito',sans-serif;font-size:14px;outline:none;resize:none;min-height:48px;}
.ai-ta::placeholder{color:rgba(255,255,255,.3);}
.ai-ta:focus{border-color:rgba(124,109,250,.6);}
.ai-send{background:linear-gradient(135deg,var(--ai),var(--ai2));color:#fff;border:none;padding:12px 22px;border-radius:10px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;transition:all .2s;white-space:nowrap;}
.ai-send:hover{opacity:.85;transform:scale(1.02);}
.ai-chips{display:flex;flex-wrap:wrap;gap:7px;}
.ai-chip{padding:5px 14px;border-radius:20px;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);color:rgba(255,255,255,.7);font-size:11px;font-weight:600;cursor:pointer;transition:all .18s;}
.ai-chip:hover{border-color:rgba(124,109,250,.5);color:#fff;background:rgba(124,109,250,.15);}
.ai-results{margin-top:20px;display:none;}
.ai-results.show{display:block;}
.ai-comment{background:rgba(255,255,255,.07);border-radius:10px;padding:12px 16px;font-size:13px;color:rgba(255,255,255,.8);margin-bottom:16px;border-left:3px solid var(--ai2);}
.ai-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;}

/* ══ MAP SECTION ══ */
.map-section{padding:0 32px 40px;}
.map-section-inner{max-width:1100px;margin:0 auto;}
.section-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:20px;}
.section-title{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;}
.section-title em{font-style:italic;color:var(--sand);}
#map{height:400px;border-radius:16px;border:1px solid var(--border);overflow:hidden;}

/* ══ CITIES ══ */
.cities-section{background:var(--white);padding:40px 32px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
.cities-inner{max-width:1100px;margin:0 auto;}
.cities-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-top:20px;}
.city-card{
  background:var(--bg2);border-radius:var(--r);padding:18px 16px;
  border:1.5px solid transparent;cursor:pointer;transition:all .2s;text-align:center;
}
.city-card:hover,.city-card.active{border-color:var(--sand);background:var(--sand3);}
.city-icon{font-size:28px;margin-bottom:8px;}
.city-name{font-weight:700;font-size:14px;margin-bottom:2px;}
.city-count{font-size:11px;color:var(--muted);}

/* ══ WHY US ══ */
.why-section{padding:40px 32px;max-width:1100px;margin:0 auto;}
.why-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;margin-top:24px;}
.why-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:24px;}
.why-icon{font-size:32px;margin-bottom:12px;}
.why-title{font-weight:700;font-size:15px;margin-bottom:6px;}
.why-desc{font-size:13px;color:var(--muted);line-height:1.6;}

/* ══ FOOTER ══ */
.footer{background:var(--ink);color:rgba(255,255,255,.6);padding:40px 32px 24px;}
.footer-inner{max-width:1100px;margin:0 auto;}
.footer-top{display:grid;grid-template-columns:1fr 1fr 1fr;gap:32px;margin-bottom:32px;}
.footer-logo{font-family:'Playfair Display',serif;font-size:24px;color:#fff;margin-bottom:8px;}
.footer-desc{font-size:13px;line-height:1.7;}
.footer-links h4{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:rgba(255,255,255,.4);margin-bottom:12px;}
.footer-links a{display:block;font-size:13px;margin-bottom:7px;transition:color .18s;}
.footer-links a:hover{color:#fff;}
.footer-bottom{border-top:1px solid rgba(255,255,255,.08);padding-top:20px;display:flex;justify-content:space-between;font-size:12px;}

/* ══ MODAL ══ */
.ov{display:none;position:fixed;inset:0;background:rgba(26,24,16,.75);backdrop-filter:blur(8px);z-index:200;align-items:center;justify-content:center;padding:20px;}
.ov.open{display:flex;}
.modal{background:var(--white);border-radius:20px;padding:36px;max-width:500px;width:100%;position:relative;max-height:90vh;overflow-y:auto;animation:mIn .25s ease;}
@keyframes mIn{from{opacity:0;transform:scale(.93)}to{opacity:1;transform:none}}
.mc{position:absolute;top:14px;right:18px;background:var(--bg2);border:none;color:var(--muted);width:30px;height:30px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.modal-title{font-family:'Playfair Display',serif;font-size:24px;margin-bottom:4px;}
.modal-sub{font-size:13px;color:var(--muted);margin-bottom:22px;line-height:1.6;}
.modal-prop{background:var(--sand3);border-radius:9px;padding:10px 14px;font-size:13px;color:var(--sand);font-weight:600;margin-bottom:18px;}
.fg{margin-bottom:13px;}
.fg label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:6px;}
.fg input,.fg select{width:100%;background:var(--bg2);border:1.5px solid transparent;color:var(--ink);padding:11px 14px;border-radius:9px;font-family:'Nunito',sans-serif;font-size:13px;outline:none;transition:border-color .2s;}
.fg input:focus,.fg select:focus{border-color:var(--sand);}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.modal-submit{width:100%;background:var(--ink);color:#fff;border:none;padding:13px;border-radius:10px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:background .2s;margin-top:6px;}
.modal-submit:hover{background:var(--sand);}
.modal-success{display:none;text-align:center;padding:20px 0;}
.modal-success.show{display:block;}
.ms-icon{font-size:56px;margin-bottom:14px;}
.ms-title{font-family:'Playfair Display',serif;font-size:22px;margin-bottom:8px;}
.ms-desc{font-size:13px;color:var(--muted);line-height:1.7;}

/* ══ TOAST ══ */
.toast{position:fixed;bottom:20px;right:20px;background:var(--ink);color:#fff;border-radius:10px;padding:11px 18px;font-size:13px;z-index:999;transform:translateY(50px);opacity:0;transition:all .3s;pointer-events:none;}
.toast.show{transform:translateY(0);opacity:1;}

/* ══ MOBILE ══ */
@media(max-width:900px){
  .nav{padding:0 16px;gap:12px;}
  .nav-region{display:none;}
  .nav-links .nav-link:not(.primary):not(.nav-ai){display:none;}
  .hero{padding:40px 16px 0;}
  .search-row{grid-template-columns:1fr 1fr;gap:10px;}
  .search-row .sf:nth-child(3),.search-row .sf:nth-child(4){display:none;}
  .search-btn{grid-column:1/-1;}
  .stats-bar{padding:12px 16px;}
  .stats-inner{gap:16px;overflow-x:auto;}
  .main-layout{grid-template-columns:1fr;padding:16px;}
  .filters{display:none;}
  .cities-grid{grid-template-columns:repeat(3,1fr);}
  .footer-top{grid-template-columns:1fr;}
  .list-card{grid-template-columns:140px 1fr;}
}
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
