<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ESTA — Портал недвижимости</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

header{
background:#111;
color:white;
padding:20px;
font-size:22px;
text-align:center;
}

.search-box{
padding:20px;
text-align:center;
background:white;
}

.search-box input{
padding:12px;
width:340px;
border-radius:6px;
border:1px solid #ccc;
font-size:16px;
}

#map{
height:400px;
margin:20px;
border-radius:10px;
}

.container{
padding:40px;
max-width:1000px;
margin:auto;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
margin-bottom:20px;
}

.card img{
margin-top:10px;
border-radius:6px;
}

</style>

</head>

<body>

<header>
ESTA — Портал недвижимости
</header>

<div class="search-box">
<input id="search" placeholder="Например: 2 комнаты балка до 50000">
</div>

<div id="map"></div>

<div class="container"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

let homes = [];
let map;
let markers = [];

fetch("listings.json")
.then(res => res.json())
.then(data => {

homes = data;

renderHomes(data);
initMap(data);

});

// ====================
// РЕНДЕР КАРТОЧЕК
// ====================

function renderHomes(data){

const container = document.querySelector(".container");

container.innerHTML = "";

data.forEach(home => {

const card = document.createElement("div");
card.className = "card";

card.innerHTML = `
<h2>${home.title}</h2>
<p>Город: ${home.city}</p>
<p>Комнаты: ${home.rooms}</p>
<p><b>${home.price}$</b></p>
<img src="${home.image}" width="100%">
`;

container.appendChild(card);

});

}

// ====================
// КАРТА
// ====================

function initMap(data){

map = L.map('map').setView([46.8403, 29.6433], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'© OpenStreetMap'
}).addTo(map);

updateMap(data);

}

function updateMap(data){

markers.forEach(m => map.removeLayer(m));
markers = [];

data.forEach(home => {

if(home.lat && home.lng){

const marker = L.marker([home.lat, home.lng])
.addTo(map)
.bindPopup("<b>"+home.title+"</b><br>$"+home.price);

markers.push(marker);

}

});

}

// ====================
// AI ПОИСК
// ====================

document.getElementById("search").addEventListener("input", function(){

const text = this.value.toLowerCase();

let maxPrice = null;
let rooms = null;

const priceMatch = text.match(/\d{4,6}/);
if(priceMatch){
maxPrice = Number(priceMatch[0]);
}

const roomMatch = text.match(/[1-4]/);
if(roomMatch){
rooms = Number(roomMatch[0]);
}

const filtered = homes.filter(home => {

if(rooms && home.rooms != rooms) return false;

if(maxPrice && home.price > maxPrice) return false;

if(text.includes("балка") && !home.title.toLowerCase().includes("балка")) return false;

if(text.includes("центр") && !home.title.toLowerCase().includes("центр")) return false;

return true;

});

renderHomes(filtered);
updateMap(filtered);

});

</script>

</body>
</html>
