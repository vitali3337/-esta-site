<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ESTA Недвижимость</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f2f4f8;
}

header{
background:#0D1B2A;
color:white;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.search{
margin-bottom:20px;
}

.search input{
width:100%;
padding:12px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:16px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card-body{
padding:15px;
}

.price{
color:#D32F2F;
font-size:26px;
font-weight:bold;
}

.title{
font-size:20px;
margin-top:6px;
}

.loc{
color:#666;
margin-top:4px;
}

.params{
margin-top:10px;
color:#444;
font-size:14px;
}

</style>

</head>
<body>

<header>
ESTA Недвижимость
</header>

<div class="container">

<div class="search">
<input id="searchInput" placeholder="Поиск недвижимости...">
</div>

<div id="cards" class="grid">
Загрузка объявлений...
</div>

</div>

<script>

const AIRTABLE_TOKEN="patHlqaizm9Ey7xnF.886c2e433073a8ef32e3093b0dc3fc3c5416ddaa2d73fbc6c472a09671adea36";
const BASE_ID="appIQflEcagGQpjXQ";
const TABLE="Listings";

let DATA=[];

async function load(){

const url=`https://api.airtable.com/v0/${BASE_ID}/${TABLE}`;

const res=await fetch(url,{
headers:{
Authorization:`Bearer ${AIRTABLE_TOKEN}`
}
});

const json=await res.json();

DATA=json.records;

render(DATA);

}

function render(items){

const grid=document.getElementById("cards");

grid.innerHTML="";

items.forEach(r=>{

const f=r.fields;

let img="";

if(f.Attachments){
img=f.Attachments[0].url;
}

const card=`

<div class="card">

<img src="${img || "https://via.placeholder.com/600x300"}">

<div class="card-body">

<div class="price">$${f.Price || ""}</div>

<div class="title">${f["Listing Title"] || ""}</div>

<div class="loc">📍 ${f.City || ""}</div>

<div class="params">

🛏 ${f.Rooms || ""} комн
📐 ${f["Area(m)"] || ""} м²

</div>

</div>

</div>

`;

grid.innerHTML+=card;

});

}

document.getElementById("searchInput").addEventListener("input",function(){

const q=this.value.toLowerCase();

const filtered=DATA.filter(r=>{
const title=(r.fields["Listing Title"] || "").toLowerCase();
return title.includes(q);
});

render(filtered);

});

load();

</script>

</body>
</html>
