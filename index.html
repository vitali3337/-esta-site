<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ESTA Недвижимость</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
}

header{
background:#0D1B2A;
color:white;
padding:20px;
text-align:center;
font-size:28px;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:1fr;
gap:20px;
}

.card{
background:white;
border-radius:14px;
overflow:hidden;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card-body{
padding:15px;
}

.price{
color:#D32F2F;
font-size:22px;
font-weight:bold;
}

.title{
font-size:18px;
margin:6px 0;
}

.loc{
color:#666;
font-size:14px;
}

.params{
margin-top:8px;
font-size:14px;
color:#555;
}

</style>
</head>

<body>

<header>
ESTA Недвижимость
</header>

<div class="container">

<div class="grid" id="cards">

Загрузка...

</div>

</div>


<script>

const AIRTABLE_TOKEN = "patHlqaizm9Ey7xnF.886c2e433073a8ef32e3093b0dc3fc3c5416ddaa2d73fbc6c472a09671adea36";
const BASE_ID = "appIQflEcagGQpjXQ";
const TABLE = "Listings";

async function load(){

let url=`https://api.airtable.com/v0/${BASE_ID}/${TABLE}`;

const res=await fetch(url,{
headers:{
Authorization:`Bearer ${AIRTABLE_TOKEN}`
}
});

const data=await res.json();

render(data.records);

}

function render(items){

const grid=document.getElementById("cards");

grid.innerHTML="";

items.forEach(r=>{

const f=r.fields;

let img="";

if(f.Attachments){
img=f.Attachments[0].url;
}

const card=`

<div class="card">

<img src="${img || 'https://via.placeholder.com/600x300'}">

<div class="card-body">

<div class="price">$${f.Price || ""}</div>

<div class="title">${f["Listing Title"] || "Объявление"}</div>

<div class="loc">📍 ${f.City || ""}</div>

<div class="params">

🛏 ${f.Rooms || ""} комн  
📐 ${f["Area(m)"] || ""} м²

</div>

</div>

</div>

`;

grid.innerHTML+=card;

});

}

load();

</script>

</body>
</html>
