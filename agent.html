<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESTA — Кабинет агента</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
}

.container{
max-width:600px;
margin:auto;
padding:40px 20px;
}

h1{
margin-bottom:20px;
}

form{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
display:flex;
flex-direction:column;
gap:12px;
}

input,textarea{
padding:10px;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;
}

button{
padding:12px;
background:black;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#c4924a;
}

</style>

</head>
<body>

<div class="container">

<h1>Добавить объект</h1>

<form id="addListing">

<input type="text" id="title" placeholder="Название объекта" required>

<input type="number" id="price" placeholder="Цена $" required>

<input type="text" id="city" placeholder="Город" required>

<input type="number" id="rooms" placeholder="Количество комнат">

<input type="text" id="floor" placeholder="Этаж">

<input type="text" id="phone" placeholder="Телефон">

<input type="text" id="image" placeholder="Ссылка на фото">

<textarea id="description" placeholder="Описание"></textarea>

<button type="submit">Добавить объявление</button>

</form>

</div>

<script>

const API = "https://realinvest-api-production.up.railway.app";

document.getElementById("addListing").addEventListener("submit", async function(e){

e.preventDefault();

const listing = {
title:document.getElementById("title").value,
price:parseInt(document.getElementById("price").value),
city:document.getElementById("city").value,
rooms:parseInt(document.getElementById("rooms").value || 0),
floor:document.getElementById("floor").value,
phone:document.getElementById("phone").value,
image:document.getElementById("image").value,
description:document.getElementById("description").value
};

try{

await fetch(API + "/listings",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify(listing)
});

alert("Объявление добавлено");

document.getElementById("addListing").reset();

}catch(e){

alert("Ошибка отправки");

}

});

</script>

</body>
</html>
