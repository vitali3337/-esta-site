<!DOCTYPE html>
<html lang="ru">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ESTA — Кабинет агента</title>

<style>

body{
font-family:Arial, sans-serif;
background:#f5f5f5;
margin:0;
padding:0;
}

header{
background:#111;
color:white;
padding:15px;
}

.container{
max-width:800px;
margin:auto;
padding:20px;
}

form{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

input,textarea{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:6px;
border:1px solid #ddd;
}

button{
background:#111;
color:white;
border:none;
padding:12px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#444;
}

</style>

</head>

<body>

<header>
<h2>ESTA — Кабинет агента</h2>
</header>

<div class="container">

<h3>Добавить объявление</h3>

<form id="addListing">

<input type="text" id="title" placeholder="Название объекта" required>

<input type="number" id="price" placeholder="Цена $" required>

<input type="text" id="city" placeholder="Город" required>

<input type="number" id="rooms" placeholder="Количество комнат">

<input type="text" id="floor" placeholder="Этаж">

<input type="text" id="phone" placeholder="Телефон">

<textarea id="description" placeholder="Описание"></textarea>

<button type="submit">Добавить объект</button>

</form>

</div>

<script>

const API="https://realinvest-api-production.up.railway.app";

document.getElementById("addListing").addEventListener("submit",async function(e){

e.preventDefault();

const listing={

title:document.getElementById("title").value,

price:parseInt(document.getElementById("price").value),

city:document.getElementById("city").value,

rooms:parseInt(document.getElementById("rooms").value)||0,

floor:document.getElementById("floor").value,

phone:document.getElementById("phone").value,

description:document.getElementById("description").value,

image:"https://images.unsplash.com/photo-1560185127-6ed189bf02f4"

};

await fetch(API+"/listings",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify(listing)

});

alert("Объявление добавлено!");

document.getElementById("addListing").reset();

});

</script>

</body>

</html>
